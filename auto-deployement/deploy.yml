---
- name: Deploy Monitoring Stack
  hosts: localhost
  connection: local
  become: true

  vars:
    monitoring_mount: /mnt/monitoring
    grafana_domain: stage.etl.cld.education
    mimir_version: "2.10.1"
    webhook_remote_user: admin

  tasks:

    # =====================
    # DISK & MOUNT (IDEMPOTENT)
    # =====================
    - name: Check if monitoring mount is already active
      ansible.builtin.command: mountpoint -q {{ monitoring_mount }}
      register: mount_check
      failed_when: false
      changed_when: false

    - name: Find a free block device (if not already mounted)
      ansible.builtin.shell: |
        ROOT_DISK=$(lsblk -no PKNAME $(findmnt -n -o SOURCE /) 2>/dev/null | head -1)
        if [ -z "$ROOT_DISK" ]; then
          ROOT_DISK=$(findmnt -n -o SOURCE / | sed 's/[0-9]*$//' | sed 's|/dev/||')
        fi
        lsblk -pno NAME,TYPE,MOUNTPOINT | while read name type mountpoint; do
          if [ "$type" != "disk" ] && [ "$type" != "part" ]; then continue; fi
          if [ -n "$mountpoint" ]; then continue; fi
          if echo "$name" | grep -q "$ROOT_DISK"; then continue; fi
          echo "$name"
        done
      register: free_disks
      changed_when: false
      when: mount_check.rc != 0

    - name: Set monitoring_device automatically
      ansible.builtin.set_fact:
        monitoring_device: "{{ free_disks.stdout_lines[0] }}"
      when: 
        - mount_check.rc != 0
        - monitoring_device is not defined
        - free_disks.stdout_lines | length > 0

    - name: Fail if no device found and not already mounted
      ansible.builtin.fail:
        msg: "Aucun disque libre trouvé et {{ monitoring_mount }} n'est pas monté."
      when: 
        - mount_check.rc != 0
        - monitoring_device is not defined

    - name: Create mount point directory
      ansible.builtin.file:
        path: "{{ monitoring_mount }}"
        state: directory
        mode: "0755"

    - name: Format and Mount (Only if not already mounted)
      block:
        - name: Check if device is already formatted
          ansible.builtin.command: blkid {{ monitoring_device }}
          register: blkid_result
          failed_when: false
          changed_when: false

        - name: Format device as ext4
          ansible.builtin.command: mkfs.ext4 {{ monitoring_device }}
          when: blkid_result.rc != 0

        - name: Mount device and persist in fstab
          ansible.posix.mount:
            path: "{{ monitoring_mount }}"
            src: "{{ monitoring_device }}"
            fstype: ext4
            opts: defaults
            state: mounted
            dump: "0"
            passno: "2"
      when: mount_check.rc != 0

    - name: Create configs directory
      ansible.builtin.file:
        path: "{{ monitoring_mount }}/configs"
        state: directory
        mode: "0755"

    # =====================
    # CONFIG FILES
    # =====================
    - name: Write nginx.conf
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/nginx.conf"
        mode: "0644"
        content: |
          map $http_upgrade $connection_upgrade {
              default upgrade;
              '' close;
          }
          upstream grafana { server grafana:3000; }
          upstream prometheus { server prometheus:9090; }
          server {
              listen 80;
              client_max_body_size 10M;
              location / {
                  root /usr/share/nginx/html;
                  index index.html index.htm;
              }
              location /grafana/ {
                  proxy_set_header Host $host;
                  proxy_pass http://grafana;
              }
              location /grafana/api/live/ {
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection $connection_upgrade;
                  proxy_set_header Host $host;
                  proxy_pass http://grafana;
              }
              location /prometheus/ {
                  proxy_set_header Host $host;
                  proxy_pass http://prometheus/;
              }
          }

    - name: Write hooks.json
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/hooks.json"
        mode: "0644"
        content: |
          [
            {
              "id": "remediate-ssh",
              "execute-command": "/etc/webhook/restart_service.sh",
              "command-working-directory": "/etc/webhook",
              "pass-arguments-to-command": [
                { "source": "payload", "name": "commonLabels.service_name" },
                { "source": "payload", "name": "commonLabels.instance" }
              ]
            }
          ]

    - name: Write alert_rules.yml (Syntax Corrected)
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/alert_rules.yml"
        mode: "0644"
        content: |
          groups:
          - name: auto_remediation
            rules:
            - alert: ServiceDown
              expr: node_systemd_unit_state{name=~"mariadb.service|proxysql.service", state="active"} == 0
              for: 1m
              labels:
                service_name: "{{ '{{' }} $labels.name {{ '}}' }}"
              annotations:
                summary: "Relance auto de {{ '{{' }} $labels.name {{ '}}' }} sur {{ '{{' }} $labels.instance {{ '}}' }}"

    - name: Write alertmanager.yml
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/alertmanager.yml"
        mode: "0644"
        content: |
          route:
            receiver: 'webhook-remediator'
            group_wait: 10s
            group_interval: 1m
            repeat_interval: 10m
          receivers:
          - name: 'webhook-remediator'
            webhook_configs:
            - url: 'http://webhook:9000/hooks/remediate-ssh'
              send_resolved: false

    - name: Write restart_service.sh (Smart Node Handling)
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/restart_service.sh"
        mode: "0755"
        content: |
          #!/bin/sh
          SERVICE_RAW=$1
          INSTANCE_RAW=$2
          USER="{{ webhook_remote_user }}"

          # Nettoyage : "mariadb.service" -> "mariadb"
          SERVICE=$(echo "$SERVICE_RAW" | sed 's/.service//')

          # Nettoyage : "dw-node1:9100" -> "dw-node1"
          NODE=$(echo "$INSTANCE_RAW" | cut -d':' -f1)

          echo "[$(date)] Action: Restart de $SERVICE sur $NODE" >> /tmp/webhook.log

          ssh -i /etc/webhook/id_rsa_webhook \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              "$USER@$NODE" "sudo systemctl restart $SERVICE" >> /tmp/webhook.log 2>&1

    - name: Write mimir.yml
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/mimir.yml"
        mode: "0644"
        content: |
          target: all
          multitenancy_enabled: false
          ingester:
            ring:
              replication_factor: 1
              kvstore: { store: inmemory }
          distributor:
            ring:
              kvstore: { store: inmemory }
          store_gateway:
            sharding_ring:
              kvstore: { store: inmemory }
          compactor:
            sharding_ring:
              kvstore: { store: inmemory }

    - name: Write prometheus.yml (Fixed Indentation)
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/prometheus.yml"
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s

          rule_files:
            - "/etc/prometheus/alert_rules.yml"

          alerting:
            alertmanagers:
              - static_configs:
                  - targets:
                      - 'alertmanager:9093'

          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']

          remote_write:
            - url: http://mimir:8080/api/v1/push
              headers:
                X-Scope-OrgID: anonymous

    - name: Write compose.yml (SSH & Nodes Integrated)
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/compose.yml"
        mode: "0644"
        content: |
          services:
            mimir:
              image: grafana/mimir:{{ mimir_version }}
              container_name: mimir
              user: "root"
              restart: unless-stopped
              command: ["-config.file=/etc/mimir.yml"]
              volumes:
                - ./configs/mimir.yml:/etc/mimir.yml:ro
                - mimir_data:/tmp/mimir

            nginx:
              image: nginx:latest
              container_name: nginx-proxy
              restart: unless-stopped
              ports: ["80:80"]
              volumes:
                - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
              depends_on: [grafana, prometheus]

            prometheus:
              image: prom/prometheus:latest
              container_name: prometheus
              restart: unless-stopped
              command:
                - --config.file=/etc/prometheus/prometheus.yml
                - --web.enable-remote-write-receiver
                - --web.external-url=http://localhost/prometheus/
                - --web.route-prefix=/
              volumes:
                - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - ./configs/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro

            grafana:
              image: grafana/grafana:latest
              container_name: grafana
              restart: unless-stopped
              environment:
                - GF_SERVER_DOMAIN={{ grafana_domain }}
                - GF_SERVER_ROOT_URL=https://{{ grafana_domain }}/grafana/
                - GF_SERVER_SERVE_FROM_SUB_PATH=true
                - GF_SECURITY_CSRF_ADDITIONAL_ORIGINS=https://{{ grafana_domain }}
                - GF_SECURITY_CSRF_TRUSTED_ORIGINS=*
                - GF_SESSION_COOKIE_SECURE=true
              depends_on: [prometheus]

            alertmanager:
              image: prom/alertmanager:latest
              container_name: alertmanager
              restart: unless-stopped
              volumes:
                - ./configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
              command: ['--config.file=/etc/alertmanager/alertmanager.yml']

            webhook:
              image: almir/webhook
              container_name: webhook
              restart: unless-stopped
              extra_hosts:
                - "dw-node1:10.0.3.4"
                - "dw-node2:10.0.3.8"
                - "dw-node3:10.0.3.12"
                - "dw-reverse-proxy:10.0.3.5"
              user: root
              volumes:
                - ./configs/hooks.json:/etc/webhook/hooks.json:ro
                - ./configs/restart_service.sh:/etc/webhook/restart_service.sh:ro
                - ./configs/id_rsa_webhook:/etc/webhook/id_rsa_webhook:ro
              entrypoint: >
                sh -c "apk add --no-cache openssh-client &&
                /usr/local/bin/webhook -verbose -hooks=/etc/webhook/hooks.json -hotreload"

          volumes:
            mimir_data:

    # =====================
    # SSH KEYS FOR WEBHOOK
    # =====================
    - name: Write SSH private key for webhook
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/id_rsa_webhook"
        mode: "0600"
        owner: root
        group: root
        content: |
          

    - name: Write SSH public key for webhook
      ansible.builtin.copy:
        dest: "{{ monitoring_mount }}/configs/id_rsa_webhook.pub"
        mode: "0644"
        content: |

    # =====================
    # DOCKER COMPOSE UP
    # =====================
    - name: Pull Docker images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ monitoring_mount }}"
      changed_when: false

    - name: Start stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ monitoring_mount }}"

    - name: Show running containers
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ monitoring_mount }}"
      register: ps_out
      changed_when: false

    - name: Stack status
      ansible.builtin.debug:
        msg: "{{ ps_out.stdout_lines }}"
